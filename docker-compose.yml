services:

  # ── Redis Cache ───────────────────────────────────────────────────────────────
  redis:
    image: redis:${REDIS_VERSION}
    container_name: mycache-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_HOST}:${REDIS_PORT}:6379"
    volumes:
      - mycache-redis:/data
    networks:
      - mycache-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mycache-redis:

networks:
  mycache-net:
    driver: bridge
